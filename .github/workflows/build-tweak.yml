name: Build AccDemoArcaea Tweak

on:
  push:
    paths:
      - '**'
      - '.github/workflows/build-tweak.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: .
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          brew install ldid dpkg make xz coreutils
        shell: bash

      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
        shell: bash

      - name: Download iOS SDK 14.5
        run: |
          mkdir -p "$THEOS/sdks"
          curl -L -o /tmp/sdks.tar.gz https://github.com/theos/sdks/archive/master.tar.gz
          tar -xzf /tmp/sdks.tar.gz -C /tmp
          mv /tmp/sdks-master/iPhoneOS14.5.sdk "$THEOS/sdks/" || true
          ls -la "$THEOS/sdks/"
        shell: bash

      - name: Build Dobby (iOS arm64 + arm64e, lipo)
        run: |
          cd "${{ github.workspace }}"
          git clone --depth 1 https://github.com/jmpews/Dobby.git dobby-src
          IOS_SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          for ARCH in arm64 arm64e; do
            mkdir -p "dobby-src/build-$ARCH"
            pushd "dobby-src/build-$ARCH" > /dev/null
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_SYSROOT="$IOS_SDK" \
              -DCMAKE_OSX_ARCHITECTURES="$ARCH" \
              -DCMAKE_SYSTEM_NAME=Darwin \
              -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
              -DDOBBY_BUILD_EXAMPLE=OFF \
              -DDOBBY_BUILD_TEST=OFF \
              -DDOBBY_GENERATE_SHARED=OFF
            make -j$(sysctl -n hw.ncpu) dobby
            popd > /dev/null
          done
          mkdir -p libs
          lipo -create \
            dobby-src/build-arm64/libdobby.a \
            dobby-src/build-arm64e/libdobby.a \
            -output libs/libdobby.a
          lipo -info libs/libdobby.a
          ls -la libs/
        shell: bash

      - name: Build (.deb package)
        run: |
          cd "${{ github.workspace }}"
          make clean
          make package FINALPACKAGE=1
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccDemoArcaea-deb
          path: packages/*.deb
          if-no-files-found: error
