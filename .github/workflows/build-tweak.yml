name: Build AccDemoArcaea

on:
  push:

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos
      DYLIB_OUT: libAccDemoArcaea.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: brew install ldid xz coreutils

      - name: Clone Theos
        run: git clone --recursive https://github.com/theos/theos.git "$THEOS"

      - name: Download iOS SDK 14.5
        run: |
          mkdir -p "$THEOS/sdks"
          curl -L -o /tmp/sdks.tar.gz https://github.com/theos/sdks/archive/master.tar.gz
          tar -xzf /tmp/sdks.tar.gz -C /tmp
          mv /tmp/sdks-master/iPhoneOS14.5.sdk "$THEOS/sdks/" || true

      - name: Build dylib
        run: |
          make clean
          make
          mkdir -p out
          DYLIB="$(find .theos/obj -maxdepth 2 -name 'AccDemoArcaea.dylib' -not -path '*.dSYM*' | head -n1)"
          if [ -z "$DYLIB" ]; then echo "AccDemoArcaea.dylib not found"; exit 1; fi
          cp "$DYLIB" "out/${DYLIB_OUT}"
          install_name_tool -change \
            /Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate \
            @rpath/libellekit.dylib \
            "out/${DYLIB_OUT}"
          install_name_tool -id @rpath/libAccDemoArcaea.dylib "out/${DYLIB_OUT}"
          ldid -S "out/${DYLIB_OUT}"
          otool -L "out/${DYLIB_OUT}"
          file "out/${DYLIB_OUT}"
          lipo -info "out/${DYLIB_OUT}"

      - name: Build ellekit
        run: |
          git clone --depth 1 https://github.com/tealbathingsuit/ellekit.git ek-src
          cd ek-src
          xcodebuild \
            -project ellekit.xcodeproj \
            -target ellekit \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 -arch arm64e \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            build SYMROOT=$PWD/build 2>&1 | tail -30
          DYLIB=$(find build -name 'libellekit.dylib' -not -path '*.dSYM*' | head -n1)
          if [ -z "$DYLIB" ]; then DYLIB=$(find build -path '*ellekit.framework/ellekit' | head -n1); fi
          test -n "$DYLIB"
          cp "$DYLIB" ../out/libellekit.dylib
          install_name_tool -id @rpath/libellekit.dylib ../out/libellekit.dylib
          ldid -S ../out/libellekit.dylib

      - name: Upload dylibs
        uses: actions/upload-artifact@v4
        with:
          name: libAccDemoArcaea-sideload
          path: |
            out/libAccDemoArcaea.dylib
            out/libellekit.dylib
          if-no-files-found: error
